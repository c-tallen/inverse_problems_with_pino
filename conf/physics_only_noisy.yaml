hydra:
  job:
    chdir: True
  run:
    dir: ./inverse_darcy_training/physics_only_noisy_seed_${seed}

max_epochs: 471
step_size: 200
gamma: 0.75
start_lr: 0.001

batch_size: 4
validation_batch_size: 1
seed: 0
physics_only: True

data:
  train_path: ./datasets/Darcy_241/piececonst_r241_N1024_smooth1.hdf5
  validation_path: ./datasets/Darcy_241/piececonst_r241_N1024_validation.hdf5
  test_path: ./datasets/Darcy_241/piececonst_r241_N1024_test.hdf5
  resolution: 241
  pde_bench: False

mappings:
  permeability: "coeff"
  darcy: "sol"

model:
  fno:
    in_channels: 1
    out_channels: 1
    decoder_layers: 1
    decoder_layer_size: 128
    dimension: 2
    latent_channels: 32
    num_fno_layers: 4
    num_fno_modes: 12
    padding: 9

physics_weight: 1.0
physics_forcing_term: 1.0
tv_weight: 0.01
max_noise: 0.2

scaling:
  permeability: 4.49996e00
  darcy: 3.88433e-03

checkpoint_freq: 10