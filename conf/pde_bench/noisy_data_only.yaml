hydra:
  job:
    chdir: True
  run:
    dir: ./pde_bench_outputs/noisy_data_only_seed_${seed}

max_epochs: 100
step_size: 100
gamma: 0.75
start_lr: 0.001
seed: 0

batch_size: 16
validation_batch_size: 8
physics_only: False

data:
  train_path: ./datasets/PDEBench/2D_DarcyFlow_beta1.0_train_split.hdf5
  validation_path: ./datasets/PDEBench/2D_DarcyFlow_beta1.0_val_split.hdf5
  test_path: ./datasets/PDEBench/2D_DarcyFlow_beta1.0_test_split.hdf5
  resolution: 128
  pde_bench: True

mappings:
  permeability: "nu"
  darcy: "tensor"

model:
  fno:
    in_channels: 1
    out_channels: 1
    decoder_layers: 1
    decoder_layer_size: 128
    dimension: 2
    latent_channels: 32
    num_fno_layers: 4
    num_fno_modes: 12
    padding: 9

physics_weight: 0.0
physics_forcing_term: 1.0
tv_weight: 0.0
max_noise: 0.2

scaling:
  darcy: 1.40925e-01
  permeability_min: 0.1
  permeability_max: 1.0

checkpoint_freq: 10