hydra:
  job:
    chdir: True
  run:
    dir: ./neural_operator_outputs/sparse/pino_weight_1.0_${seed}

max_epochs: 250
step_size: 200
gamma: 0.5
start_lr: 0.001

batch_size: 1
validation_batch_size: 1
seed: 0

data:
  train_path: ./datasets/Darcy_241/piececonst_r241_N1024_smooth1.hdf5
  validation_path: ./datasets/Darcy_241/piececonst_r241_N1024_smooth2.hdf5
  resolution: 241
  pde_bench: False

mappings:
  permeability: "coeff"
  darcy: "sol"

model:
  fno:
    in_channels: 2
    out_channels: 1
    decoder_layers: 1
    decoder_layer_size: 128
    dimension: 2
    latent_channels: 32
    num_fno_layers: 4
    num_fno_modes: 12
    padding: 9

physics_weight: 1.0
physics_forcing_term: 1.0
tv_weight: 0.01
max_noise: 0.0
sensor_densities: [1.0, 0.5, 0.25, 0.10, 0.05, 0.01, 0.005, 0.001]

scaling:
  permeability: 4.49996e00
  darcy: 3.88433e-03

checkpoint_freq: 5