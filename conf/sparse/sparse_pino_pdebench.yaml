hydra:
  job:
    chdir: True
  run:
    dir: ./neural_operator_outputs/sparse/pino_pdebench

max_epochs: 250
step_size: 200
gamma: 0.5
start_lr: 0.001

batch_size: 16
validation_batch_size: 1
seed: 0

data:
  train_path: ./datasets/PDEBench/2D_DarcyFlow_beta1.0_train_split.hdf5
  validation_path: ./datasets/PDEBench/2D_DarcyFlow_beta1.0_val_split.hdf5
  test_path: ./datasets/PDEBench/2D_DarcyFlow_beta1.0_test_split.hdf5
  resolution: 128
  pde_bench: True

mappings:
  permeability: "nu"
  darcy: "tensor"

model:
  fno:
    in_channels: 2
    out_channels: 1
    decoder_layers: 1
    decoder_layer_size: 128
    dimension: 2
    latent_channels: 32
    num_fno_layers: 4
    num_fno_modes: 12
    padding: 9

physics_weight: 0.2
physics_forcing_term: 1.0
tv_weight: 0.01
max_noise: 0.0
sensor_densities: [1.0, 0.5, 0.25, 0.10, 0.05, 0.01, 0.005]

scaling:
  permeability_min: 0.1
  permeability_max: 1.0
  darcy: 1.40925e-01

checkpoint_freq: 1